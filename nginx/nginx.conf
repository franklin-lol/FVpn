###############################################################################
# FVpn — Nginx Reverse Proxy
###############################################################################

limit_req_zone  $binary_remote_addr zone=api:10m  rate=120r/m;
limit_req_zone  $binary_remote_addr zone=sub:10m  rate=60r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

###############################################################################
# HTTP → HTTPS redirect (port 80)
###############################################################################
server {
    listen 80;
    server_name _;
    # Return redirect preserving host:port so browser lands on panel
    return 301 https://$http_host$request_uri;
}

###############################################################################
# Panel: HTTPS on port 2095
###############################################################################
server {
    listen 2095 ssl http2;
    server_name _;

    ssl_certificate     /ssl/cert.pem;
    ssl_certificate_key /ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # CSP: connect-src includes https: to allow API calls from panel
    # Also includes wss: for WebSocket stats feed
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https: wss:;" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    ###########################################################################
    # Backend API
    ###########################################################################
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        limit_conn conn 30;

        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;

        # $http_host includes port (e.g. yadex.crabdance.com:2095)
        # This is critical: uvicorn uses Host header to build redirect URLs.
        # Without port, redirects lose :2095 and break.
        proxy_set_header    Host              $http_host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Tell uvicorn the original scheme was HTTPS (it connects to us on HTTP)
        proxy_set_header    X-Forwarded-Proto https;
        proxy_set_header    X-Forwarded-Port  $server_port;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Subscription URLs — separate (softer) rate limit
    location /api/subscriptions/fetch/ {
        limit_req zone=sub burst=20 nodelay;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Proto https;
    }

    ###########################################################################
    # WebSocket — real-time stats feed
    ###########################################################################
    location /ws/ {
        proxy_pass          http://backend:8000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $http_host;
        proxy_set_header    X-Forwarded-Proto https;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    ###########################################################################
    # Frontend SPA
    ###########################################################################
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $http_host;
        # SPA routing: 404 responses → serve index.html
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://frontend:80/index.html;
    }
}

###############################################################################
# API-only port 2096 (for CLI / bots / external tooling)
###############################################################################
server {
    listen 2096 ssl http2;
    server_name _;

    ssl_certificate     /ssl/cert.pem;
    ssl_certificate_key /ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}

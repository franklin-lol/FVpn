x-logging: &log
  driver: "json-file"
  options: { max-size: "20m", max-file: "5" }

services:
  ##############################################################################
  # BACKEND
  ##############################################################################
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniproxy-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - backend-data:/data
      - /etc/fvpn/ssl:/ssl:ro
      - ./configs/xray:/etc/xray        # shared with xray container
      - ./configs/singbox:/etc/sing-box  # shared with singbox container
      # Docker socket so backend can restart proxy containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fvpn-net
    logging: *log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  ##############################################################################
  # FRONTEND
  ##############################################################################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uniproxy-frontend
    restart: unless-stopped
    networks:
      - fvpn-net
    logging: *log

  ##############################################################################
  # NGINX — SSL termination + reverse proxy
  ##############################################################################
  nginx:
    build:
      context: ./nginx
    container_name: uniproxy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2095:2095"
      - "2096:2096"
    volumes:
      - /etc/fvpn/ssl:/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - fvpn-net
    logging: *log

  ##############################################################################
  # REDIS
  ##############################################################################
  redis:
    image: redis:7-alpine
    container_name: uniproxy-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-fvpn_redis}
    volumes:
      - redis-data:/data
    networks:
      - fvpn-net
    logging: *log
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-fvpn_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ##############################################################################
  # XRAY-CORE — VLESS/Trojan/Shadowsocks proxy
  ##############################################################################
  xray:
    image: teddysun/xray:latest
    container_name: fvpn-xray
    restart: unless-stopped
    network_mode: host          # host network so it can bind proxy ports directly
    volumes:
      - ./configs/xray:/etc/xray
      - /usr/local/share/xray:/usr/local/share/xray:ro
    logging: *log

  ##############################################################################
  # SING-BOX — Hysteria2/TUIC/ShadowTLS/WireGuard proxy
  ##############################################################################
  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: fvpn-singbox
    restart: unless-stopped
    network_mode: host          # host network for direct port binding
    volumes:
      - ./configs/singbox:/etc/sing-box
    cap_add:
      - NET_ADMIN               # required for TUN/WireGuard
    logging: *log

  ##############################################################################
  # TELEGRAM BOT
  ##############################################################################
  bot:
    build:
      context: ./bot
    container_name: uniproxy-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fvpn-net
    logging: *log

  ##############################################################################
  # WATCHTOWER — nightly auto-update
  ##############################################################################
  watchtower:
    image: containrrr/watchtower
    container_name: uniproxy-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup
    networks:
      - fvpn-net
    logging: *log

################################################################################
volumes:
  backend-data:
  redis-data:
  nginx-logs:

networks:
  fvpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  ###########################################################################
  # BACKEND — FastAPI
  ###########################################################################
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uniproxy-backend
    restart: unless-stopped
    env_file: .env
    # No explicit `environment:` block — everything comes from .env
    # This prevents env overrides fighting with .env values
    volumes:
      - backend-data:/data
      - /etc/fvpn/ssl:/ssl:ro
      - /usr/local/bin/xray:/usr/local/bin/xray:ro
      - /usr/local/bin/sing-box:/usr/local/bin/sing-box:ro
      - /etc/xray:/etc/xray
      - /etc/sing-box:/etc/sing-box
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fvpn-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ###########################################################################
  # FRONTEND — React static via Nginx
  ###########################################################################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uniproxy-frontend
    restart: unless-stopped
    networks:
      - fvpn-net
    logging: *default-logging

  ###########################################################################
  # NGINX — SSL termination + reverse proxy
  ###########################################################################
  nginx:
    build:
      context: ./nginx
    container_name: uniproxy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2095:2095"
      - "2096:2096"
    volumes:
      - /etc/fvpn/ssl:/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - fvpn-net
    logging: *default-logging

  ###########################################################################
  # REDIS — Cache + pub/sub
  ###########################################################################
  redis:
    image: redis:7-alpine
    container_name: uniproxy-redis
    restart: unless-stopped
    # Password is read from compose variable substitution (.env in project root)
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-fvpn_redis_secret}
    volumes:
      - redis-data:/data
    networks:
      - fvpn-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-fvpn_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###########################################################################
  # TELEGRAM BOT
  ###########################################################################
  bot:
    build:
      context: ./bot
    container_name: uniproxy-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fvpn-net
    logging: *default-logging

  ###########################################################################
  # WATCHTOWER — nightly auto-update
  ###########################################################################
  watchtower:
    image: containrrr/watchtower
    container_name: uniproxy-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup
    networks:
      - fvpn-net
    logging: *default-logging

###############################################################################
volumes:
  backend-data:
  redis-data:
  nginx-logs:

networks:
  fvpn-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
